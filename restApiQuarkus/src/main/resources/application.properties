omdb.api.key=ef2b968b
omdb.api.url=http://www.omdbapi.com/
quarkus.rest-client.omdb-api.url=http://www.omdbapi.com
quarkus.rest-client.omdb-api.key=ef2b968b
quarkus.rest-client.omdb-api.connect-timeout=5000
quarkus.rest-client.omdb-api.read-timeout=5000


proxy.host=proxy.tango.lu
proxy.port=80

# PostgreSQL datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${SPRING_DATASOURCE_USERNAME}
quarkus.datasource.password=${SPRING_DATASOURCE_PASSWORD}
quarkus.datasource.jdbc.url=${SPRING_DATASOURCE_URL}

# JDBC Driver (normalement auto-détecté mais tu peux préciser)
quarkus.datasource.jdbc.driver=org.postgresql.Driver

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect

